name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/devdoubleh2/medusa-backend
  IMAGE_STOREFRONT: ghcr.io/devdoubleh2/medusa-storefront

jobs:
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
            ${{ env.IMAGE_BACKEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-storefront:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./storefront
          push: true
          tags: |
            ${{ env.IMAGE_STOREFRONT }}:${{ github.sha }}
            ${{ env.IMAGE_STOREFRONT }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [build-backend, build-storefront]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Dokploy backend deploy
        run: |
          curl -sf -X POST "https://bozorchi.store/api/application.deploy" \
            -H "x-api-key: ${{ secrets.DOKPLOY_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"applicationId": "DYuZ6FTSCoOVJ3rceDb_W"}'
      - name: Wait 30s
        run: sleep 30
      - name: Trigger Dokploy storefront deploy
        run: |
          curl -sf -X POST "https://bozorchi.store/api/application.deploy" \
            -H "x-api-key: ${{ secrets.DOKPLOY_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"applicationId": "Hwq8yjL-MLrCDmuwJk0_Q"}'
