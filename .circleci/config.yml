version: 2.1

jobs:
  build-backend:
    docker:
      - image: cimg/node:20.0
    steps:
      - checkout
      - setup_remote_docker:
          version: docker23
      - run:
          name: Build backend image
          working_directory: backend
          command: |
            docker build -t medusa-backend:${CIRCLE_SHA1} .
      - run:
          name: Tag and push to registry
          command: |
            echo "${DOCKER_PASSWORD}" | docker login -u "${DOCKER_USERNAME}" --password-stdin
            docker tag medusa-backend:${CIRCLE_SHA1} ${DOCKER_USERNAME}/medusa-backend:${CIRCLE_SHA1}
            docker tag medusa-backend:${CIRCLE_SHA1} ${DOCKER_USERNAME}/medusa-backend:latest
            docker push ${DOCKER_USERNAME}/medusa-backend:${CIRCLE_SHA1}
            docker push ${DOCKER_USERNAME}/medusa-backend:latest

  build-storefront:
    docker:
      - image: cimg/node:20.0
    steps:
      - checkout
      - setup_remote_docker:
          version: docker23
      - run:
          name: Build storefront image
          working_directory: storefront
          command: |
            docker build -t medusa-storefront:${CIRCLE_SHA1} .
      - run:
          name: Tag and push to registry
          command: |
            echo "${DOCKER_PASSWORD}" | docker login -u "${DOCKER_USERNAME}" --password-stdin
            docker tag medusa-storefront:${CIRCLE_SHA1} ${DOCKER_USERNAME}/medusa-storefront:${CIRCLE_SHA1}
            docker tag medusa-storefront:${CIRCLE_SHA1} ${DOCKER_USERNAME}/medusa-storefront:latest
            docker push ${DOCKER_USERNAME}/medusa-storefront:${CIRCLE_SHA1}
            docker push ${DOCKER_USERNAME}/medusa-storefront:latest

  deploy:
    docker:
      - image: cimg/base:stable
    steps:
      - run:
          name: Trigger Dokploy deployment
          command: |
            curl -X POST "${DOKPLOY_WEBHOOK_URL}" \
              -H "Content-Type: application/json" \
              -d '{"image_tag": "'${CIRCLE_SHA1}'"}'

workflows:
  build-and-deploy:
    jobs:
      - build-backend
      - build-storefront
      - deploy:
          requires:
            - build-backend
            - build-storefront
          filters:
            branches:
              only: main
